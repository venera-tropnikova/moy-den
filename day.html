<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>День — Мой день</title>
  <link rel="stylesheet" href="css/day.css">
</head>
<body>

  <div class="screen">

    <div class="statusbar" aria-hidden="true">
      <span class="statusbar__icons">
        <span>▪</span><span>▪</span><span>▪</span>
      </span>
      <span class="statusbar__time" id="statusbar-time">09:41</span>
    </div>

    <main class="day-screen" aria-labelledby="day-title">

      <header class="day-hero">
        <a class="back-btn" href="calendar.html" aria-label="Вернуться в календарь">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
               stroke="currentColor" stroke-width="1.7"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="12 4 6 10 12 16"/>
          </svg>
          <span>Назад</span>
        </a>

        <p class="day-hero__weekday" id="day-weekday">—</p>
        <h1 class="day-hero__title" id="day-title">—</h1>
      </header>

      <section class="day-section" aria-labelledby="events-title">
        <h2 class="day-section__title" id="events-title">События</h2>
        <p class="day-section__empty">Пока ничего нет</p>
      </section>

      <section class="day-section" aria-labelledby="tasks-title">
        <div class="day-section__head">
          <h2 class="day-section__title" id="tasks-title">Задачи</h2>
          <button class="day-add-btn" type="button" id="show-task-form">+ Добавить задачу</button>
        </div>

        <p class="day-section__empty" id="tasks-empty">Пока ничего нет</p>
        <ul class="day-tasks" id="day-tasks-list" role="list"></ul>

        <form class="day-task-form" id="day-task-form" hidden>
          <input
            class="day-task-input"
            id="day-task-input"
            type="text"
            placeholder="Новая задача"
            maxlength="200"
            autocomplete="off"
          >
          <div class="day-task-form__actions">
            <button class="day-task-form__btn day-task-form__btn--primary" type="submit">Сохранить</button>
            <button class="day-task-form__btn" type="button" id="cancel-task-form">Отмена</button>
          </div>
        </form>
      </section>

      <section class="day-section" aria-labelledby="birthdays-title">
        <h2 class="day-section__title" id="birthdays-title">Поздравления</h2>
        <p class="day-section__empty" id="birthdays-empty">Нет поводов для поздравлений</p>
        <ul class="day-tasks" id="birthdays-list" role="list"></ul>
      </section>

    </main>

  </div>

  <script src="js/day.js"></script>
</body>
</html>
