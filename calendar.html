<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Календарь — Мой день</title>
  <link rel="stylesheet" href="css/calendar.css">
</head>
<body>

  <div class="screen">

    <div class="statusbar" aria-hidden="true">
      <span class="statusbar__icons">
        <span>▪</span><span>▪</span><span>▪</span>
      </span>
      <span class="statusbar__time">09:41</span>
    </div>

    <main class="calendar-screen" aria-labelledby="calendar-title">

      <header class="calendar-hero">
        <div class="calendar-hero__top">
          <a class="back-btn" href="index.html" aria-label="Вернуться на главную">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
                 stroke="currentColor" stroke-width="1.7"
                 stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="12 4 6 10 12 16"/>
            </svg>
          </a>
          <p class="calendar-hero__eyebrow">Календарь</p>
        </div>

        <div class="calendar-hero__row">
          <h1 class="calendar-hero__title" id="calendar-title">Июль 2026</h1>

          <div class="month-controls">
            <button
              class="month-nav current-month-btn"
              type="button"
              id="today-btn"
              aria-label="Текущий месяц"
              title="Текущий месяц"
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="1.7"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="5" width="18" height="16" rx="2"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
                <line x1="8" y1="3" x2="8" y2="7"/>
                <line x1="16" y1="3" x2="16" y2="7"/>
                <circle cx="12" cy="15" r="1.5" fill="currentColor" stroke="none"/>
              </svg>
            </button>

            <button class="month-nav" type="button" id="prev-month" aria-label="Предыдущий месяц">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
                   stroke="currentColor" stroke-width="1.7"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="12 4 6 10 12 16"/>
              </svg>
            </button>

            <button class="month-nav" type="button" id="next-month" aria-label="Следующий месяц">
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
                   stroke="currentColor" stroke-width="1.7"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="8 4 14 10 8 16"/>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <section class="calendar-card" aria-label="Сетка месяца">
        <div class="weekdays" aria-hidden="true">
          <span>Пн</span>
          <span>Вт</span>
          <span>Ср</span>
          <span>Чт</span>
          <span>Пт</span>
          <span>Сб</span>
          <span>Вс</span>
        </div>

        <div class="month-grid" id="month-grid"></div>
      </section>

      <section class="month-events" id="month-events" hidden aria-labelledby="month-events-title">
        <h2 class="month-events__title" id="month-events-title">В этом месяце</h2>
        <div class="month-events__body" id="month-events-body"></div>
      </section>

    </main>

    <nav class="bottom-nav" aria-label="Навигация приложения">
      <a class="nav-btn" href="index.html">
        <svg class="nav-btn__icon" width="25" height="25" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.7"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span class="nav-btn__lbl">Главная</span>
      </a>
      <button class="nav-btn" type="button">
        <svg class="nav-btn__icon" width="25" height="25" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.7"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 11 12 14 22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        <span class="nav-btn__lbl">Задачи</span>
      </button>
      <button class="nav-btn nav-btn--active" type="button">
        <svg class="nav-btn__icon" width="25" height="25" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.7"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8"  y1="2" x2="8"  y2="6"/>
          <line x1="3"  y1="10" x2="21" y2="10"/>
        </svg>
        <span class="nav-btn__lbl">Календарь</span>
      </button>
      <a class="nav-btn" href="profile.html">
        <svg class="nav-btn__icon" width="25" height="25" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.7"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.08V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.08-.4H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.08V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.4.22.74.56 1 1 .24.43.37.92.4 1.4H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51-.4z"/>
        </svg>
        <span class="nav-btn__lbl">Настройки</span>
      </a>
    </nav>

  </div>

  <script src="js/orthodox-easter.js"></script>
  <script src="js/holidays-ru.js"></script>
  <script src="js/calendar.js"></script>
</body>
</html>
