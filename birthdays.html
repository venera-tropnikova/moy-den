<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поздравления — Мой день</title>
  <link rel="stylesheet" href="css/birthdays.css">
</head>
<body>

  <div class="screen">

    <div class="statusbar" aria-hidden="true">
      <span class="statusbar__icons">
        <span>▪</span><span>▪</span><span>▪</span>
      </span>
      <span class="statusbar__time" id="statusbar-time">09:41</span>
    </div>

    <main class="birthdays-screen" aria-labelledby="birthdays-title">

      <header class="birthdays-hero">
        <a class="back-btn" href="profile.html" aria-label="Вернуться в профиль">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
               stroke="currentColor" stroke-width="1.7"
               stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="12 4 6 10 12 16"/>
          </svg>
          <span>Назад</span>
        </a>

        <p class="birthdays-hero__eyebrow">Не забыть поздравить</p>
        <h1 class="birthdays-hero__title" id="birthdays-title">Поздравления</h1>
      </header>

      <section class="birthdays-section" id="birthdays-list-section" aria-labelledby="birthdays-list-title">
        <h2 class="birthdays-section__title" id="birthdays-list-title">Список</h2>
        <p class="birthdays-empty" id="birthdays-empty">Пока никого нет</p>
        <ul class="birthdays-list" id="birthdays-list" role="list"></ul>
        <button class="birthday-save-btn" type="button" id="show-birthday-form">
          + Добавить человека
        </button>
      </section>

      <section class="birthdays-section" id="birthday-form-section" aria-labelledby="birthdays-form-title" hidden>
        <h2 class="birthdays-section__title" id="birthdays-form-title">Добавить</h2>

        <form class="birthday-form" id="birthday-form">
          <label class="birthday-field" for="birthday-name">
            <span class="birthday-field__label">Имя</span>
            <input
              class="birthday-input"
              id="birthday-name"
              name="name"
              type="text"
              maxlength="80"
              autocomplete="off"
              placeholder="Например, Мама"
            >
          </label>

          <label class="birthday-field" for="birthday-relation">
            <span class="birthday-field__label">Кто это</span>
            <input
              class="birthday-input"
              id="birthday-relation"
              name="relation"
              type="text"
              maxlength="80"
              autocomplete="off"
              placeholder="Например, подруга"
            >
          </label>

          <div class="birthday-field">
            <span class="birthday-field__label" id="birthday-day-label">День рождения</span>
            <div class="birthday-date-row">
              <label class="birthday-date-row__item" for="birthday-day">
                <span class="birthday-field__hint">День</span>
                <input
                  class="birthday-input"
                  id="birthday-day"
                  name="birthDay"
                  type="number"
                  min="1"
                  max="31"
                  inputmode="numeric"
                  aria-labelledby="birthday-day-label"
                  placeholder="12"
                >
              </label>
              <label class="birthday-date-row__item" for="birthday-month">
                <span class="birthday-field__hint">Месяц</span>
                <select class="birthday-input" id="birthday-month" name="birthMonth" aria-labelledby="birthday-day-label">
                  <option value="">Месяц</option>
                  <option value="1">Январь</option>
                  <option value="2">Февраль</option>
                  <option value="3">Март</option>
                  <option value="4">Апрель</option>
                  <option value="5">Май</option>
                  <option value="6">Июнь</option>
                  <option value="7">Июль</option>
                  <option value="8">Август</option>
                  <option value="9">Сентябрь</option>
                  <option value="10">Октябрь</option>
                  <option value="11">Ноябрь</option>
                  <option value="12">Декабрь</option>
                </select>
              </label>
            </div>
          </div>

          <label class="birthday-field" for="birthday-year">
            <span class="birthday-field__label">Год рождения</span>
            <input
              class="birthday-input"
              id="birthday-year"
              name="birthYear"
              type="number"
              min="1900"
              max="2100"
              inputmode="numeric"
              placeholder="Необязательно"
            >
          </label>

          <div class="birthday-form__actions">
            <button class="birthday-save-btn" type="submit">Сохранить</button>
            <button class="birthday-cancel-btn" type="button" id="birthday-cancel-btn">Отмена</button>
          </div>
          <p class="birthday-form__status" id="birthday-status" aria-live="polite"></p>
        </form>
      </section>

    </main>

  </div>

  <script src="js/birthdays-storage.js"></script>
  <script src="js/birthdays.js"></script>
</body>
</html>
